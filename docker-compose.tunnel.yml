version: '3.9'

# ── Именованный Cloudflare Tunnel (постоянный домен condrfaceit.ru) ──────────
# cloudflared делает ИСХОДЯЩЕЕ соединение к Cloudflare (порт 7844/443), входящие
# порты не нужны — обходит блокировку ТСПУ. SSL терминирует Cloudflare.
# В дашборде Cloudflare настраивается ОДИН public hostname:
#     condrfaceit.ru  →  http://nginx:80
# а nginx уже разводит /socket.io на backend, остальное — на frontend.
#
# В .env.production должна быть строка:  CLOUDFLARE_TUNNEL_TOKEN=eyJ...
# Запуск:  docker compose -f docker-compose.tunnel.yml --env-file .env.production up -d --build

services:

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: condr
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: condr_faceit
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U condr -d condr_faceit"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redisdata:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build: ./backend
    restart: always
    # api.telegram.org доступен только по IPv6 (IPv4 режет ТСПУ). Форсируем IPv6,
    # иначе axios без таймаута иногда выбирает IPv4 и виснет навсегда.
    extra_hosts:
      - "api.telegram.org:2001:67c:4e8:f004::9"
    environment:
      DATABASE_URL: postgresql://condr:${DB_PASSWORD}@postgres:5432/condr_faceit
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      BOT_TOKEN: ${BOT_TOKEN}
      PUBLIC_URL: ${PUBLIC_URL}
      FRONTEND_URL: ${PUBLIC_URL}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID}
      TOPIC_PURCHASES: ${TOPIC_PURCHASES}
      TOPIC_SUPPORT: ${TOPIC_SUPPORT}
      TOPIC_REPORTS: ${TOPIC_REPORTS}
      TOPIC_MATCHES: ${TOPIC_MATCHES}
      CARD_NUMBER: ${CARD_NUMBER}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      DISCORD_CATEGORY_ID: ${DISCORD_CATEGORY_ID}
      PORT: 4000
    volumes:
      - uploads:/app/uploads
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:4000
    restart: always
    environment:
      BACKEND_URL: http://backend:4000
    networks:
      - internal
    depends_on:
      - backend

  nginx:
    image: nginx:1.25-alpine
    restart: always
    volumes:
      - ./nginx/nginx.tunnel.conf:/etc/nginx/nginx.conf:ro
    networks:
      - internal
    depends_on:
      - frontend
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: always
    # QUIC (UDP 7844) режется сетью (ТСПУ) — форсируем HTTP/2 поверх TCP/443.
    command: tunnel --no-autoupdate --protocol http2 run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      TUNNEL_TRANSPORT_PROTOCOL: http2
    networks:
      - internal
    depends_on:
      - nginx

volumes:
  pgdata:
  redisdata:
  uploads:

networks:
  internal:
    driver: bridge
    enable_ipv6: true
